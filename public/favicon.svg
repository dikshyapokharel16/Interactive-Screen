<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#1e1b4b"/>

  <!-- Portal body -->
  <circle cx="50" cy="50" r="44" fill="url(#portalGlow)"/>

  <!-- Concentric rings -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="33" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.65" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="17" fill="none" stroke="#ddd6fe" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="12" fill="url(#innerGlow)"/>

  <!-- Bright core -->
  <circle cx="50" cy="50" r="5" fill="white" opacity="0.95" filter="url(#glow)"/>
</svg>